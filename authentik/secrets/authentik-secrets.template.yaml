# TEMPLATE — fill in, seal, and commit ONLY the sealed output (see infra/sealed-secrets/).
#
# Seal per-namespace: use `authentik` for prod, `authentik-dev` for dev (seal twice).
#
#   # prod
#   kubeseal --format=yaml --controller-namespace kube-system \
#     < authentik-secrets.yaml > authentik-secrets.prod.sealed.yaml   # namespace: authentik
#   # dev
#   kubeseal --format=yaml --controller-namespace kube-system \
#     < authentik-secrets.yaml > authentik-secrets.dev.sealed.yaml    # namespace: authentik-dev
#
# Generate a strong secret key:  openssl rand -base64 60 | tr -d '\n'
apiVersion: v1
kind: Secret
metadata:
  name: authentik-secrets
  namespace: authentik          # change to authentik-dev when sealing the dev copy
type: Opaque
stringData:
  AUTHENTIK_SECRET_KEY: "REPLACE_WITH_openssl_rand_base64_60"
  AUTHENTIK_POSTGRESQL__PASSWORD: "REPLACE_WITH_AUTHENTIK_DB_PASSWORD"
