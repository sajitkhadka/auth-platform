# Common Authentik Helm values (shared by dev + prod). Chart: authentik/authentik 2026.5.3
#
# How config/secrets are injected (verified against the chart templates):
#  - The chart flattens the `authentik:` map into a generated Secret, e.g.
#    authentik.postgresql.host -> AUTHENTIK_POSTGRESQL__HOST. EMPTY values are skipped.
#  - The server/worker Deployments do `envFrom: secretRef <config secret>` and then
#    append `global.envFrom`. So we keep NON-secret config here under `authentik:` and
#    inject the two real secrets (SECRET_KEY, DB password) via global.envFrom -> the
#    sealed `authentik-secrets` (appended last; no conflict since they're empty above).
#
# NOTE: this chart version bundles NEITHER Postgres nor Redis. We use the external host
# Postgres (see scripts/postgres/) and a small in-namespace Redis (authentik/redis.yaml).

global:
  envFrom:
    - secretRef:
        name: authentik-secrets   # provides AUTHENTIK_SECRET_KEY + AUTHENTIK_POSTGRESQL__PASSWORD

authentik:
  error_reporting:
    enabled: false
  postgresql:
    host: "192.168.0.120"       # host/port/name/user are non-secret; password via global.envFrom
  redis:
    host: "authentik-redis"     # in-namespace Redis Service (authentik/redis.yaml)

server:
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      # HTTP-01 today (the existing working issuer). Switch to letsencrypt-dns01 once the
      # Cloudflare API token is sealed (see infra/cert-manager/).
      cert-manager.io/cluster-issuer: letsencrypt-prod
    # host + tls secretName set per-env (values-dev/prod.yaml)

worker:
  replicas: 1

# External host Postgres — do NOT deploy the bundled postgresql subchart (default is false).
postgresql:
  enabled: false
